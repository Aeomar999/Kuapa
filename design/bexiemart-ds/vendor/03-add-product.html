<!-- @dsCard group="Vendor" name="Add Product" subtitle="Create listing form" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vendor · Add Product</title><link rel="stylesheet" href="../_shared/app.css">
<style>.up{height:96px;border:2px dashed var(--s-300);border-radius:var(--r-xl);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--muted);background:#fff;flex:1}
.thumb{width:72px;height:96px;border-radius:var(--r-lg);position:relative;flex:0 0 auto}
.barbtn{position:absolute;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--s-100);padding:14px 20px 26px}</style></head>
<body><div class="frame">
<div class="phone"><div class="notch"></div>
 <div class="statusbar"><span>9:41</span><span class="right">5G ▮▮▮ 100%</span></div>
 <div class="screen">
  <div class="appbar" style="padding-top:6px"><div class="iconbtn"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></div><span class="h2">New Product</span><div class="iconbtn ghost"></div></div>
  <div class="scroll" style="padding:8px 20px 110px">
   <span class="label">Photos</span>
   <div class="row gap2" style="margin-bottom:20px">
     <div class="thumb" style="background:linear-gradient(135deg,#fcd34d,#fbbf24)"><div class="circle" style="position:absolute;top:-6px;right:-6px;width:22px;height:22px;background:var(--error)"><svg width="12" height="12" fill="none" stroke="#fff" viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></div></div>
     <div class="up"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg><span class="tiny">Add</span></div>
   </div>
   <span class="label">Product name</span><div class="input" style="margin-bottom:16px">Leather Tote Bag</div>
   <span class="label">Description</span><div class="input" style="height:80px;margin-bottom:16px;color:var(--muted)">Handcrafted genuine leather tote with…</div>
   <div class="row gap3" style="margin-bottom:16px">
     <div style="flex:1"><span class="label">Price (GHS)</span><div class="input">320.00</div></div>
     <div style="flex:1"><span class="label">Stock</span><div class="input">14</div></div></div>
   <span class="label">Category</span>
   <div class="input row between" style="display:flex;align-items:center;margin-bottom:16px"><span>Fashion · Bags</span><svg width="18" height="18" fill="none" stroke="var(--muted)" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></div>
   <span class="label">Variants</span>
   <div class="row gap2"><span class="chip active">Tan</span><span class="chip">Black</span><span class="chip">+ Add</span></div>
   <div class="row between card" style="padding:14px;margin-top:18px"><div><div class="small bold">Instant Delivery eligible</div><div class="tiny muted">Available in Accra</div></div><span style="width:38px;height:22px;border-radius:9999px;background:var(--success);position:relative"><span style="position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;right:2px"></span></span></div>
  </div>
  <div class="barbtn"><button class="btn btn-primary btn-block">Publish Product</button></div>
 </div>
</div><div class="caption">Vendor · Add Product</div></div></body></html>
