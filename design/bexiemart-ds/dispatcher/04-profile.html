<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatcher · Profile</title><link rel="stylesheet" href="../_shared/app.css">
<style>.phead{background:linear-gradient(135deg,#06406b,#0e5891);padding:24px 20px 50px;color:#fff;text-align:center}

.mrow .c{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;flex:0 0 auto}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:#94a3b8;font-size:11px;font-weight:800}</style></head>
<body><div class="frame">

     <span class="tag" style="background:var(--success-light);color:var(--success)">Verified</span></div>

     <div class="mrow"><div class="c" style="background:var(--brand-50)"><svg width="18" height="18" fill="none" stroke="var(--brand-700)" viewBox="0 0 24 24"><path d="M16 22v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/></svg></div><span class="small bold" style="flex:1">Edit Profile</span><svg width="18" height="18" fill="none" stroke="var(--muted)" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>

     <div class="mrow"><div class="c" style="background:var(--s-100)"><svg width="18" height="18" fill="none" stroke="#475569" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M9.1 9a3 3 0 0 1 5.8 1c0 2-3 2.5-3 2.5M12 17h.01"/></svg></div><span class="small bold" style="flex:1">Help & Support</span><svg width="18" height="18" fill="none" stroke="var(--muted)" viewBox="0 0 24 24"><path d="m9 18 6-6-6-6"/></svg></div>
     <div class="mrow" style="border:none"><div class="c" style="background:var(--error-light)"><svg width="18" height="18" fill="none" stroke="var(--error)" viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg></div><span class="small bold" style="flex:1;color:var(--error)">Log Out</span></div>

  </div>

   <span class="tab" style="color:var(--brand-700)"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg>Profile</span>

 </div>
</div><div class="caption">Dispatcher · Profile</div></div></body></html>
