<!-- @dsCard group="Dispatcher" name="Active Delivery" subtitle="Live job + navigation" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatcher · Active Delivery</title><link rel="stylesheet" href="../_shared/app.css">
<style>.map{position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,#e8edf2 0 1px,transparent 1px 40px),
  repeating-linear-gradient(90deg,#e8edf2 0 1px,transparent 1px 40px),#eef3f7}
.route{position:absolute;left:70px;top:90px;width:180px;height:230px;border-left:4px solid var(--brand-600);border-bottom:4px solid var(--brand-600);border-radius:0 0 0 50px}
.pin{position:absolute;width:36px;height:36px;border-radius:var(--r-full) var(--r-full) var(--r-full) 0;transform:rotate(-45deg);display:grid;place-items:center;box-shadow:var(--shadow-md)}
.online{position:absolute;top:14px;left:16px;right:16px;display:flex;justify-content:space-between;align-items:center}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:var(--r-3xl) var(--r-3xl) 0 0;box-shadow:0 -12px 30px rgba(2,45,77,.14);padding:18px 20px 26px}</style></head>
<body><div class="frame">
<div class="phone"><div class="notch"></div>
 <div class="statusbar"><span>9:41</span><span class="right">5G ▮▮▮ 100%</span></div>
 <div class="screen">
  <div class="map"></div><div class="route"></div>
  <div class="pin" style="left:58px;top:74px;background:var(--success)"><svg style="transform:rotate(45deg)" width="16" height="16" fill="none" stroke="#fff" viewBox="0 0 24 24"><path d="M1 3h15v13H1zM16 8h4l3 3v5h-7"/></svg></div>
  <div class="pin" style="left:230px;top:300px;background:var(--brand-700)"><svg style="transform:rotate(45deg)" width="16" height="16" fill="none" stroke="#fff" viewBox="0 0 24 24"><path d="M21 10c0 7-9 12-9 12s-9-5-9-12a9 9 0 0 1 18 0z"/></svg></div>
  <div class="online"><span class="pill" style="background:var(--success);color:#fff">● Online</span><span class="iconbtn"><svg width="20" height="20" fill="none" stroke="#0f172a" viewBox="0 0 24 24"><path d="M3 11 22 2l-9 19-2-8z"/></svg></span></div>

  <div class="sheet">
    <div class="row" style="justify-content:center;margin-bottom:12px"><div style="width:42px;height:5px;border-radius:9999px;background:var(--s-200)"></div></div>
    <div class="row between" style="margin-bottom:14px"><div><div class="tiny muted">Next stop · Pickup</div><div class="h3">Jean Collections</div></div>
      <span class="pill" style="background:var(--brand-50);color:var(--brand-700)">1.2 km · 4 min</span></div>
    <div class="card" style="padding:14px;display:flex;gap:12px;align-items:center;margin-bottom:14px">
      <div class="avatar" style="width:44px;height:44px;background:#fbcfe8"></div>
      <div style="flex:1"><div class="small bold">Order #BX-2291 · Ama K.</div><div class="tiny muted">East Legon · GHS 249 · Cash</div></div>
      <div class="circle" style="width:40px;height:40px;background:var(--brand-700)"><svg width="18" height="18" fill="none" stroke="#fff" viewBox="0 0 24 24"><path d="M22 16.9v3a2 2 0 0 1-2.2 2A19.8 19.8 0 0 1 2 4.1 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7c.4 2.5 1.4 3.7.5 5l-1.3 1.2a16 16 0 0 0 6 6l1.2-1.3c.5-.5 1.3-.7 2-.5l2.7.7a2 2 0 0 1 1.5 2z"/></svg></div>
    </div>
    <div class="row gap2"><button class="btn btn-ghost btn-sm" style="flex:0 0 auto">Details</button><button class="btn btn-primary" style="flex:1">Navigate · Arrived</button></div>
  </div>

  <div class="tabbar">
   <span class="tab active"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 11 22 2l-9 19-2-8z"/></svg>Deliver</span>
   <span class="tab"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
   <span class="tab"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3v18h18M7 14l4-4 3 3 5-6"/></svg></span>
   <span class="tab"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.3A8.4 8.4 0 1 1 21 11.5z"/></svg></span>
   <span class="tab"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>
  </div>
 </div>
</div><div class="caption">Dispatcher · Active Delivery</div></div></body></html>
