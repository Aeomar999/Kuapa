<!-- @dsCard group="Dispatcher" name="Analytics" subtitle="Performance + ratings" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatcher · Analytics</title><link rel="stylesheet" href="../_shared/app.css">
<style>.bars{display:flex;align-items:flex-end;gap:8px;height:130px}.bar{flex:1;border-radius:6px 6px 0 0;background:linear-gradient(180deg,#38bdf8,#0284c7)}
.tab{display:flex;flex-direction:column;align-items:center;gap:4px;color:#94a3b8;font-size:11px;font-weight:800}</style></head>
<body><div class="frame">
<div class="phone"><div class="notch"></div>
 <div class="statusbar"><span>9:41</span><span class="right">5G ▮▮▮ 100%</span></div>
 <div class="screen">
  <div class="appbar" style="padding-top:6px"><span class="h2">Analytics</span><span class="chip active">This week</span></div>
  <div class="scroll" style="padding-bottom:110px">
   <div class="row gap3 px">
     <div class="card" style="flex:1;padding:16px"><svg width="20" height="20" fill="none" stroke="#16a34a" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4z"/></svg><div class="price" style="font-size:22px;margin-top:8px">82</div><div class="tiny muted">Deliveries</div></div>
     <div class="card" style="flex:1;padding:16px"><svg width="20" height="20" fill="#f59e0b" stroke="#f59e0b" viewBox="0 0 24 24"><path d="m12 2 3 7 7 .5-5.5 4.5 2 7-6.5-4-6.5 4 2-7L2 9.5 9 9z"/></svg><div class="price" style="font-size:22px;margin-top:8px">4.9</div><div class="tiny muted">Rating</div></div>
   </div>
   <div class="row gap3 px" style="margin-top:12px">
     <div class="card" style="flex:1;padding:16px"><svg width="20" height="20" fill="none" stroke="#2563eb" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg><div class="price" style="font-size:22px;margin-top:8px">96%</div><div class="tiny muted">On-time</div></div>
     <div class="card" style="flex:1;padding:16px"><svg width="20" height="20" fill="none" stroke="#7c3aed" viewBox="0 0 24 24"><path d="M20 7h-9M14 17H5M17 17a3 3 0 1 0 6 0 3 3 0 0 0-6 0zM1 7a3 3 0 1 0 6 0 3 3 0 0 0-6 0z"/></svg><div class="price" style="font-size:22px;margin-top:8px">218 km</div><div class="tiny muted">Distance</div></div>
   </div>
   <div class="section"><div class="section-h"><span class="h2">Deliveries / day</span></div>
     <div class="card" style="padding:18px"><div class="bars">
       <div class="bar" style="height:50%"></div><div class="bar" style="height:70%"></div><div class="bar" style="height:40%"></div><div class="bar" style="height:90%"></div><div class="bar" style="height:60%"></div><div class="bar" style="height:100%"></div><div class="bar" style="height:75%"></div></div>
       <div class="row between" style="margin-top:10px"><span class="tiny muted">M</span><span class="tiny muted">T</span><span class="tiny muted">W</span><span class="tiny muted">T</span><span class="tiny muted">F</span><span class="tiny muted">S</span><span class="tiny muted">S</span></div></div></div>
   <div class="section"><div class="card" style="padding:16px;display:flex;gap:14px;align-items:center">
     <div class="circle" style="width:46px;height:46px;background:var(--success-light)"><svg width="22" height="22" fill="none" stroke="var(--success)" viewBox="0 0 24 24"><path d="m12 2 2.4 7.4H22l-6 4.5 2.3 7.1L12 16.6 5.7 21l2.3-7.1-6-4.5h7.6z"/></svg></div>
     <div style="flex:1"><div class="small bold">Top Rider this week 🎉</div><div class="tiny muted">You're in the top 5% in Accra</div></div></div></div>
  </div>
  <div class="tabbar">
   <span class="tab"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 11 22 2l-9 19-2-8z"/></svg></span>
   <span class="tab"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
   <span class="tab" style="color:var(--brand-700)"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 3v18h18M7 14l4-4 3 3 5-6"/></svg>Stats</span>
   <span class="tab"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 11.5a8.4 8.4 0 0 1-9 8.4L3 21l1.1-3.3A8.4 8.4 0 1 1 21 11.5z"/></svg></span>
   <span class="tab"><svg width="22" height="22" fill="none" stroke="currentColor" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-6 8-6s8 2 8 6"/></svg></span>
  </div>
 </div>
</div><div class="caption">Dispatcher · Analytics</div></div></body></html>
