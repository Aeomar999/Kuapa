<!-- @dsCard group="Dispatcher" name="Incoming Request" subtitle="New delivery offer" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dispatcher · Incoming Request</title><link rel="stylesheet" href="../_shared/app.css">
<style>.map{position:absolute;inset:0;background:repeating-linear-gradient(0deg,#e8edf2 0 1px,transparent 1px 40px),repeating-linear-gradient(90deg,#e8edf2 0 1px,transparent 1px 40px),#eef3f7;filter:blur(1px)}
.scrim{position:absolute;inset:0;background:rgba(2,45,77,.35)}
.card2{position:absolute;left:14px;right:14px;bottom:16px;background:#fff;border-radius:var(--r-3xl);box-shadow:var(--shadow-lg);padding:22px 20px 24px}
.ring{width:74px;height:74px;border-radius:50%;display:grid;place-items:center;margin:0 auto;background:conic-gradient(var(--brand-700) 70%,var(--s-200) 0)}
.ring .in{width:60px;height:60px;border-radius:50%;background:#fff;display:grid;place-items:center;font-family:'Raleway';font-weight:900;font-size:22px;color:var(--brand-700)}
.leg{display:flex;gap:12px;align-items:flex-start;padding:10px 0}
.leg .d{width:11px;height:11px;border-radius:50%;margin-top:4px;flex:0 0 auto}</style></head>
<body><div class="frame">
<div class="phone"><div class="notch"></div>
 <div class="statusbar"><span>9:41</span><span class="right">5G ▮▮▮ 100%</span></div>
 <div class="screen">
  <div class="map"></div><div class="scrim"></div>
  <div class="card2">
   <div class="ring"><div class="in">12</div></div>
   <div class="row between" style="margin-top:16px"><span class="h2">New Delivery</span><span class="pill" style="background:var(--success);color:#fff">+ GHS 18</span></div>
   <div class="row gap4" style="margin-top:6px"><span class="tiny muted">5.4 km total</span><span class="tiny muted">· ~22 min</span><span class="tiny muted">· Cash</span></div>
   <div class="divider"></div>
   <div class="leg"><div class="d" style="background:var(--success)"></div><div style="flex:1"><div class="small bold">Jean Collections</div><div class="tiny muted">East Legon · Pickup 1.2 km away</div></div></div>
   <div class="leg"><div class="d" style="background:var(--brand-700)"></div><div style="flex:1"><div class="small bold">Ama Kuffour</div><div class="tiny muted">Osu · Drop-off</div></div></div>
   <div class="row gap2" style="margin-top:16px"><button class="btn btn-ghost" style="flex:0 0 110px">Decline</button><button class="btn btn-primary" style="flex:1">Accept</button></div>
  </div>
 </div>
</div><div class="caption">Dispatcher · Incoming Request</div></div></body></html>
