<!-- @dsCard group="Customer" name="Login / Auth" subtitle="Sign in with social + email" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer · Login</title><link rel="stylesheet" href="../_shared/app.css">
<style>.top{height:300px;background:linear-gradient(160deg,#06406b,#0e5891);border-radius:0 0 40px 40px;position:relative;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;padding:0 26px 30px;color:#fff}
.top .b1{position:absolute;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(56,189,248,.35),transparent 70%);right:-60px;top:-40px}
.soc{flex:1;height:50px;border:1px solid var(--border);border-radius:var(--r-lg);display:grid;place-items:center;background:#fff}</style></head>
<body><div class="frame">
<div class="phone"><div class="notch"></div>
 <div class="statusbar"><span style="color:#fff">9:41</span><span class="right" style="color:#fff">5G ▮▮▮ 100%</span></div>
 <div class="screen" style="background:#fff">
  <div class="top"><div class="b1"></div>
    <div class="circle" style="width:60px;height:60px;background:rgba(255,255,255,.15);margin-bottom:18px"><span class="font-head" style="font-weight:900;font-size:26px">B</span></div>
    <div class="font-head" style="font-weight:900;font-size:28px">Welcome back</div>
    <div style="opacity:.85;font-size:14px;margin-top:6px">Sign in to keep shopping on Bexiemart</div>
  </div>
  <div style="padding:26px 26px 0">
    <span class="label">Email or phone</span>
    <div class="input row gap2" style="display:flex;align-items:center"><svg width="18" height="18" fill="none" stroke="var(--muted)" viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/></svg><span class="grow muted">nicholas@email.com</span></div>
    <span class="label" style="margin-top:16px">Password</span>
    <div class="input row between" style="display:flex;align-items:center"><span class="grow">••••••••</span><svg width="18" height="18" fill="none" stroke="var(--muted)" viewBox="0 0 24 24"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg></div>
    <div class="row between" style="margin-top:12px"><span class="row gap2 small t2"><span class="circle" style="width:18px;height:18px;border:2px solid var(--s-300)"></span>Remember me</span>
      <span class="small bold" style="color:var(--brand-700)">Forgot password?</span></div>
    <button class="btn btn-primary btn-block" style="margin-top:20px">Sign In</button>
    <div class="row gap3" style="margin:20px 0;align-items:center"><div style="flex:1;height:1px;background:var(--s-200)"></div><span class="tiny muted">or continue with</span><div style="flex:1;height:1px;background:var(--s-200)"></div></div>
    <div class="row gap3">
      <div class="soc"><svg width="20" height="20" viewBox="0 0 24 24"><path fill="#EA4335" d="M12 11v3.8h5.3c-.2 1.4-1.6 4-5.3 4-3.2 0-5.8-2.6-5.8-5.8S8.8 7 12 7c1.8 0 3 .8 3.7 1.4l2.5-2.4C16.6 4.5 14.5 3.6 12 3.6 6.9 3.6 2.8 7.7 2.8 12.8S6.9 22 12 22c5.9 0 9.8-4.1 9.8-9.9 0-.7-.1-1.2-.2-1.7z"/></svg></div>
      <div class="soc"><svg width="20" height="20" fill="#0f172a" viewBox="0 0 24 24"><path d="M16 1c-1.3.1-2.8.9-3.7 2-.8.9-1.5 2.3-1.3 3.6 1.4.1 2.9-.7 3.7-1.8.8-1 1.4-2.3 1.3-3.8zM20 17c-.5 1.2-.8 1.7-1.5 2.8-1 1.5-2.4 3.4-4.1 3.4-1.5 0-1.9-1-4-1-2 0-2.5 1-4 1-1.7 0-3-1.7-4-3.2-2.8-4.2-3.1-9.2-1.4-11.8 1.2-1.9 3.1-3 4.9-3 1.8 0 2.9 1 4.4 1 1.4 0 2.3-1 4.4-1 1.6 0 3.3.9 4.5 2.4-3.9 2.2-3.3 7.8.3 9.6z"/></svg></div>
      <div class="soc"><svg width="20" height="20" fill="#1877F2" viewBox="0 0 24 24"><path d="M22 12a10 10 0 1 0-11.6 9.9v-7H7.9V12h2.5V9.8c0-2.5 1.5-3.9 3.8-3.9 1.1 0 2.2.2 2.2.2v2.5h-1.3c-1.2 0-1.6.8-1.6 1.6V12h2.8l-.4 2.9h-2.4v7A10 10 0 0 0 22 12z"/></svg></div>
    </div>
    <div class="row" style="justify-content:center;margin-top:22px"><span class="small t2">New here? <b style="color:var(--brand-700)">Create account</b></span></div>
  </div>
 </div>
</div><div class="caption">Customer · Login / Auth</div></div></body></html>
