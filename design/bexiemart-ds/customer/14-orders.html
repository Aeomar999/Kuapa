<!-- @dsCard group="Customer" name="Orders" subtitle="Order history + status" -->
<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Customer · Orders</title><link rel="stylesheet" href="../_shared/app.css">
<style>.ocard{background:#fff;border:1px solid var(--border);border-radius:var(--r-xl);padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px}</style></head>
<body><div class="frame">
<div class="phone"><div class="notch"></div>
 <div class="statusbar"><span>9:41</span><span class="right">5G ▮▮▮ 100%</span></div>
 <div class="screen">
  <div class="appbar" style="padding-top:6px"><div class="iconbtn"><svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></div><span class="h2">My Orders</span><div class="iconbtn ghost"></div></div>
  <div class="row gap2" style="padding:8px 20px 4px"><span class="chip active">Active</span><span class="chip">Completed</span><span class="chip">Cancelled</span></div>
  <div class="scroll" style="padding:14px 20px 30px">
   <div class="ocard">
     <div class="row between"><span class="small bold">#BX-2291</span><span class="tag" style="background:var(--brand-50);color:var(--brand-700)">Out for delivery</span></div>
     <div class="divider"></div>
     <div class="row gap3"><div class="tile" style="width:56px;height:56px;background:linear-gradient(135deg,#bfdbfe,#60a5fa)"></div>
       <div style="flex:1"><div class="small bold">Pro Wireless Earbuds +2 more</div><div class="tiny muted" style="margin-top:3px">3 items · GHS 934.00</div></div></div>
     <div class="row gap2" style="margin-top:14px"><button class="btn btn-primary btn-sm" style="flex:1">Track Order</button><button class="btn btn-ghost btn-sm" style="flex:1">Help</button></div>
   </div>
   <div class="ocard">
     <div class="row between"><span class="small bold">#BX-2284</span><span class="tag" style="background:var(--warning-light);color:var(--warning)">Preparing</span></div>
     <div class="divider"></div>
     <div class="row gap3"><div class="tile" style="width:56px;height:56px;background:linear-gradient(135deg,#fca5a5,#ef4444)"></div>
       <div style="flex:1"><div class="small bold">KFC Ghana · Zinger combo</div><div class="tiny muted" style="margin-top:3px">2 items · GHS 90.00</div></div></div>
     <div class="row gap2" style="margin-top:14px"><button class="btn btn-primary btn-sm" style="flex:1">Track Order</button><button class="btn btn-ghost btn-sm" style="flex:1">Contact</button></div>
   </div>
   <div class="ocard" style="opacity:.85">
     <div class="row between"><span class="small bold">#BX-2270</span><span class="tag" style="background:var(--success-light);color:var(--success)">Delivered</span></div>
     <div class="divider"></div>
     <div class="row gap3"><div class="tile" style="width:56px;height:56px;background:linear-gradient(135deg,#fcd34d,#fbbf24)"></div>
       <div style="flex:1"><div class="small bold">Leather Tote Bag</div><div class="tiny muted" style="margin-top:3px">1 item · GHS 320.00 · Jun 18</div></div></div>
     <div class="row gap2" style="margin-top:14px"><button class="btn btn-dark btn-sm" style="flex:1">Reorder</button><button class="btn btn-ghost btn-sm" style="flex:1">★ Rate</button></div>
   </div>
  </div>
 </div>
</div><div class="caption">Customer · Orders</div></div></body></html>
